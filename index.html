function cnt(t){return WINES.filter(w=>w.type===t).length;}

function renderCatalog(){
  const q=search.toLowerCase();
  const list=WINES.filter(w=>(filter==='tous'||w.type===filter)&&(!q||[w.name,w.region,w.pays,w.cepages].some(s=>s.toLowerCase().includes(q))));
  const cards=list.map(w=>{const c=TYPE[w.type],ph=photos[w.id];return`<div class="card" style="border-left:3px solid ${c.accent}" onclick="openWine('${w.id}')"><div class="card-top"><div><div class="card-name">${w.name}</div><div class="card-region">${[w.region,w.pays].filter(Boolean).join(' · ')}</div></div><div class="card-right"><div class="card-prix" style="color:${c.accent}">${w.prix||'—'}</div>${ph?`<span style="font-size:10px;background:${c.bg};color:${c.col};padding:1px 6px;border-radius:6px">📷</span>`:''}</div></div><div class="card-meta"><span class="badge" style="background:${c.bg};color:${c.col}">${c.label}</span>${w.millesime?`<span class="mill">${w.millesime}</span>`:''}${w.cepages?`<span class="cepage">${w.cepages}</span>`:''}</div></div>`;}).join('');
  app.innerHTML=`<div class="wrap"><div class="header"><div class="logo-block">${logo()}<div><div class="logo-text"><span>WINE</span><span>NOT</span></div><div class="tagline">Katalog win</div></div></div><span style="font-size:11px;color:#aaa">${WINES.length} win w katalogu</span></div><input id="search" type="text" placeholder="Wino, region, kraj, szczep…" value="${search}" oninput="onSearch(this.value)"/><div class="filters"><button ${bs('tous','#2C2C2A')} onclick="setFilter('tous')">Wszystkie (${WINES.length})</button><button ${bs('rouge','#8B1C1C')} onclick="setFilter('rouge')">● Czerwone (${cnt('rouge')})</button><button ${bs('blanc','#7B5E2A')} onclick="setFilter('blanc')">● Białe (${cnt('blanc')})</button><button ${bs('rose','#AA3B60')} onclick="setFilter('rose')">● Różowe (${cnt('rose')})</button><button ${bs('effervescent','#534AB7')} onclick="setFilter('effervescent')">● Musujące (${cnt('effervescent')})</button></div><div id="count">${list.length} win</div><div class="grid">${cards}</div></div>`;
}

function renderDetail(w){
  const c=TYPE[w.type],ph=photos[w.id];
  app.innerHTML=`<div class="wrap"><div class="header"><div class="logo-block">${logo()}<div><div class="logo-text"><span>WINE</span><span>NOT</span></div><div class="tagline">Katalog win</div></div></div></div><button class="back" onclick="closeDetail()">← Powrót do katalogu</button><div class="detail-inner"><div class="bottle-col"><div class="bottle-frame">${ph?`<img src="${ph}" alt="${w.name}"/>`:bottle(w.type)}</div><input type="file" id="photo-input" accept="image/*" style="display:none" onchange="uploadPhoto(this)"/><button class="btn-photo" style="border:1px solid ${c.accent};color:${c.accent}" onclick="document.getElementById('photo-input').click()">${ph?'📷 Zmień zdjęcie':'📷 Dodaj zdjęcie'}</button>${ph?`<button class="btn-del" onclick="delPhoto('${w.id}')">Usuń zdjęcie</button>`:''}<span class="badge" style="background:${c.bg};color:${c.col}">${c.label}</span><span style="font-size:11px;color:#aaa;text-align:center">${w.typeRaw}</span></div><div class="info-col"><div class="wine-title">${w.name}</div><div class="wine-sub">${[w.region,w.pays].filter(Boolean).join(' · ')}</div><div class="stats">${w.millesime?`<div class="stat" style="border-left:3px solid ${c.accent}"><div class="stat-label">Rocznik</div><div class="stat-val" style="color:${c.accent}">${w.millesime}</div></div>`:''} ${w.prix?`<div class="stat" style="border-left:3px solid ${c.accent}"><div class="stat-label">Cena</div><div class="stat-val" style="color:${c.accent}">${w.prix}</div></div>`:''}</div>${w.cepages?`<div class="cepage-block"><div class="cepage-label">Szczep</div><div class="cepage-val">${w.cepages}</div></div>`:''} ${!ph?`<div class="no-photo-hint">Kliknij „Dodaj zdjęcie", aby przesłać<br/>zdjęcie tej butelki.</div>`:''}</div></div></div>`;
}

function openWine(id){selected=WINES.find(w=>w.id===id);renderDetail(selected);}
function closeDetail(){selected=null;renderCatalog();}
function setFilter(f){filter=f;renderCatalog();}
function onSearch(v){search=v;renderCatalog();}

function uploadPhoto(input){
  const file=input.files[0];if(!file||!selected)return;
  const img=new Image(),url=URL.createObjectURL(file);
  img.onload=()=>{const r=Math.min(1,500/img.width),c=document.createElement('canvas');c.width=img.width*r;c.height=img.height*r;c.getContext('2d').drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);const b=c.toDataURL('image/jpeg',0.82);photos[selected.id]=b;try{localStorage.setItem('wph:'+selected.id,b);}catch(e){}renderDetail(selected);};img.src=url;
}
function delPhoto(id){delete photos[id];try{localStorage.removeItem('wph:'+id);}catch(e){}if(selected&&selected.id===id)renderDetail(selected);}

renderCatalog();
</script>
</body>
</html>
